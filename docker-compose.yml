services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: Hello@123
      MYSQL_DATABASE: MANY_Vinato-db
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pHello@123"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
      - "8081:8080"
      - "2222:22"
