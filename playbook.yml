- name: Deploy Spring Boot app on web server
  hosts: webserver
  become: false

  vars:
    app_dir: /app
    db_host: db
    db_name: MANY_Vinato-db
    db_user: root
    db_pass: Hello@123

  tasks:
    - name: Reset any local changes
      command: git reset --hard HEAD
      args:
        chdir: "{{ app_dir }}"

    - name: Remove untracked files before pull
      command: git clean -fd
      args:
        chdir: "{{ app_dir }}"

    - name: Pull latest code from GitHub
      command: git pull
      args:
        chdir: "{{ app_dir }}"

    - name: Set production application.properties
      copy:
        dest: "{{ app_dir }}/src/main/resources/application.properties"
        content: |
          spring.application.name=demo
          server.port=8080
          spring.datasource.url=jdbc:mysql://{{ db_host }}:3306/{{ db_name }}
          spring.datasource.username={{ db_user }}
          spring.datasource.password={{ db_pass }}
          spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
          spring.jpa.hibernate.ddl-auto=update
          spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
          spring.jpa.show-sql=true

    - name: Build project with Maven
      command: mvn package -DskipTests
      args:
        chdir: "{{ app_dir }}"
      environment:
        JAVA_HOME: /opt/java/openjdk
        PATH: /opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Run tests against SQLite
      command: mvn test
      args:
        chdir: "{{ app_dir }}"
      environment:
        JAVA_HOME: /opt/java/openjdk
        PATH: /opt/java/openjdk/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    - name: Backup MySQL database
      shell: "mysqldump -h {{ db_host }} -u {{ db_user }} -p{{ db_pass }} {{ db_name }} > {{ app_dir }}/backup.sql"

    - name: Fetch backup.sql to local machine
      fetch:
        src: "{{ app_dir }}/backup.sql"
        dest: ./backup.sql
        flat: yes
