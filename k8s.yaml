apiVersion: v1
kind: Namespace
metadata:
  name: devops-final

---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: devops-final
type: Opaque
stringData:
  root-password: Hello@123

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: devops-final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: db
          image: mysql:8
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: MANY_Vinato-db
          ports:
            - containerPort: 3306

---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: devops-final
spec:
  selector:
    app: db
  ports:
    - port: 3306
      targetPort: 3306

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: devops-final
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: devops-final-web:latest
          ports:
            - containerPort: 8080
            - containerPort: 22

---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: devops-final
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
    - name: app
      port: 8080
      targetPort: 8080
      nodePort: 30081
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30022
